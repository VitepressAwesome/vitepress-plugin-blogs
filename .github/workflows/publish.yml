name: Publish Packages to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list what would be published without actually publishing)'
        type: boolean
        default: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Publish all packages (dry run)
        if: ${{ inputs.dry_run }}
        run: node scripts/publish-all.mjs --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish all packages
        if: ${{ !inputs.dry_run }}
        run: node scripts/publish-all.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
